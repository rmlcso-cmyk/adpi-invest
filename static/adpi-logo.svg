<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" role="img">
  <title>ADPI Logo</title>
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8cdd8;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#e8eaf0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a0a8b8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d5e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b0b8c8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="adGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b0b8cc"/>
      <stop offset="100%" style="stop-color:#9098b0"/>
    </linearGradient>
  </defs>

  <!-- FALCON BODY -->
  <!-- Main body -->
  <path d="M 130 60 C 145 45 165 40 180 45 C 195 50 205 65 210 80 C 215 95 210 115 200 130 C 190 145 175 155 160 158 C 145 161 128 155 118 145 C 108 135 105 120 108 105 C 111 90 118 73 130 60 Z" fill="url(#bodyGrad)" stroke="#3d4a6e" stroke-width="1.2"/>

  <!-- Head -->
  <path d="M 165 38 C 178 32 192 33 200 42 C 208 51 207 64 200 72 C 193 80 180 83 170 79 C 160 75 154 63 155 52 C 156 44 158 42 165 38 Z" fill="url(#bodyGrad)" stroke="#3d4a6e" stroke-width="1.2"/>

  <!-- Beak -->
  <path d="M 198 55 C 210 52 220 54 222 60 C 224 66 218 70 210 68 C 202 66 198 62 198 55 Z" fill="#b8bcc8" stroke="#3d4a6e" stroke-width="1"/>

  <!-- Eye -->
  <circle cx="185" cy="52" r="5" fill="#2a3a5e" stroke="#1a2a4e" stroke-width="0.8"/>
  <circle cx="186" cy="51" r="1.5" fill="white"/>

  <!-- Neck detail -->
  <path d="M 170 78 C 165 85 160 92 158 100" fill="none" stroke="#3d4a6e" stroke-width="1"/>
  <path d="M 180 80 C 178 88 175 96 172 105" fill="none" stroke="#3d4a6e" stroke-width="1"/>

  <!-- Wing - main large wing -->
  <path d="M 155 110 C 135 118 108 128 80 145 C 55 160 30 178 20 195 C 35 188 65 178 95 168 C 125 158 150 148 162 142 C 158 138 156 128 155 110 Z" fill="url(#wingGrad)" stroke="#3d4a6e" stroke-width="1.2"/>

  <!-- Wing feather lines -->
  <path d="M 140 120 C 110 132 75 148 45 168" fill="none" stroke="#5a6888" stroke-width="0.8"/>
  <path d="M 145 128 C 118 138 85 153 55 172" fill="none" stroke="#5a6888" stroke-width="0.8"/>
  <path d="M 150 136 C 125 144 95 158 68 176" fill="none" stroke="#5a6888" stroke-width="0.8"/>

  <!-- Tail feathers -->
  <path d="M 115 155 C 105 168 90 182 75 195 C 85 188 100 178 112 168 Z" fill="url(#wingGrad)" stroke="#3d4a6e" stroke-width="1"/>
  <path d="M 108 158 C 96 170 82 184 68 196 C 78 190 92 180 104 170 Z" fill="url(#wingGrad)" stroke="#3d4a6e" stroke-width="1"/>

  <!-- Leg/claw -->
  <path d="M 160 158 C 162 168 160 180 155 190" fill="none" stroke="#3d4a6e" stroke-width="1.5"/>
  <path d="M 155 190 C 148 196 140 200 132 198" fill="none" stroke="#3d4a6e" stroke-width="1.2"/>
  <path d="M 155 190 C 155 198 154 205 152 210" fill="none" stroke="#3d4a6e" stroke-width="1.2"/>
  <path d="M 155 190 C 162 197 168 202 172 205" fill="none" stroke="#3d4a6e" stroke-width="1.2"/>

  <!-- Digital/tech elements on head - circuit boxes -->
  <rect x="195" y="25" width="8" height="8" fill="none" stroke="#2a5a9e" stroke-width="1.2" rx="1"/>
  <rect x="208" y="20" width="7" height="7" fill="none" stroke="#2a5a9e" stroke-width="1.2" rx="1"/>
  <rect x="220" y="15" width="6" height="6" fill="none" stroke="#2a5a9e" stroke-width="1.2" rx="1"/>
  <rect x="212" y="32" width="6" height="6" fill="none" stroke="#2a5a9e" stroke-width="1.2" rx="1"/>
  <line x1="203" y1="29" x2="208" y2="26" stroke="#2a5a9e" stroke-width="0.8"/>
  <line x1="215" y1="23" x2="220" y2="20" stroke="#2a5a9e" stroke-width="0.8"/>
  <line x1="215" y1="23" x2="215" y2="32" stroke="#2a5a9e" stroke-width="0.8"/>
  <line x1="218" y1="35" x2="218" y2="35" stroke="#2a5a9e" stroke-width="0.8"/>
  <!-- Dot accent -->
  <circle cx="228" cy="42" r="2" fill="#2a5a9e"/>

  <!-- Network dots on body -->
  <circle cx="148" cy="95" r="2.5" fill="#2a5a9e"/>
  <circle cx="165" cy="88" r="2.5" fill="#2a5a9e"/>
  <circle cx="178" cy="100" r="2.5" fill="#2a5a9e"/>
  <circle cx="158" cy="112" r="2.5" fill="#2a5a9e"/>
  <circle cx="172" cy="118" r="2.5" fill="#2a5a9e"/>
  <circle cx="185" cy="108" r="2" fill="#2a5a9e"/>
  <circle cx="145" cy="110" r="2" fill="#2a5a9e"/>
  <circle cx="168" cy="130" r="2" fill="#2a5a9e"/>

  <!-- Network lines connecting dots -->
  <line x1="148" y1="95" x2="165" y2="88" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="165" y1="88" x2="178" y2="100" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="178" y1="100" x2="172" y2="118" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="148" y1="95" x2="158" y2="112" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="158" y1="112" x2="172" y2="118" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="165" y1="88" x2="158" y2="112" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="178" y1="100" x2="185" y2="108" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="145" y1="110" x2="158" y2="112" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="158" y1="112" x2="168" y2="130" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>
  <line x1="172" y1="118" x2="168" y2="130" stroke="#2a5a9e" stroke-width="0.7" opacity="0.7"/>

  <!-- Small star accent -->
  <path d="M 105 195 L 107 190 L 109 195 L 105 192 L 109 192 Z" fill="#2a5a9e" opacity="0.7"/>

  <!-- ADPI TEXT -->
  <!-- AD - lighter grey -->
  <text x="265" y="145" font-family="Arial,sans-serif" font-size="88" font-weight="700" fill="url(#adGrad)" letter-spacing="-4">AD</text>
  <!-- PI - dark navy -->
  <text x="367" y="145" font-family="Arial,sans-serif" font-size="88" font-weight="700" fill="#1a2e5e" letter-spacing="-4">PI</text>
</svg>
